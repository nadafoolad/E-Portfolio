<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="stylesheet.css">
        <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>
        <title>CV</title>
        <style>
            /* CV Container Positioning */
            .cv__wrapper {
                position: relative;
                display: inline-block;
                max-width: 400px;
                cursor: pointer;
            }

            .zoom__icon {
                position: absolute;
                top: 15px;
                right: 15px;
                font-size: 1.5rem;
                color: #0b1e5f;
                background: rgba(255, 255, 255, 0.8);
                padding: 8px;
                border-radius: 50%;
                box-shadow: 0 4px 10px rgba(0,0,0,0.2);
                transition: .3s;
                opacity: 0; 
                pointer-events: none;
            }

            .cv__wrapper:hover .zoom__icon {
                opacity: 1; 
            }

            /* --- FIX: Lightbox Modal Scrolling --- */
            .modal {
                display: none; 
                position: fixed; 
                z-index: 1000; 
                left: 0;
                top: 0;
                width: 100%; 
                height: 100%; 
                background-color: rgba(0,0,0,0.95); 
                overflow-y: scroll; /* Force vertical scroll */
                -webkit-overflow-scrolling: touch;
            }

            .modal-content {
                display: block;
                margin: 40px auto; /* Margin at top and bottom */
                width: 95%;
                max-width: 1000px; /* Adjust this to make it as big as you want */
                height: auto;
                border: 5px solid #fff;
                border-radius: 0.5rem;
            }

            .close {
                position: fixed; /* Keep X fixed to screen */
                top: 20px;
                right: 35px;
                color: #fff;
                font-size: 50px;
                font-weight: bold;
                cursor: pointer;
                z-index: 2000;
                text-shadow: 0 0 10px rgba(0,0,0,0.5);
            }

            .close:hover { color: #bbb; }
        </style>
    </head>
    <body>
        <header class="l-header">
            <nav class="nav bd-grid">
                <div><a href="index.html" class="nav__logo">E-Portfolio</a></div>
                <div class="nav__menu" id="nav-menu">
                    <ul class="nav__list">
                        <li class="nav__item"><a href="index.html" class="nav__link">Home</a></li>
                        <li class="nav__item"><a href="cv.html" class="nav__link active-link">CV</a></li>
                        <li class="nav__item"><a href="cover-letter.html" class="nav__link">Cover Letter</a></li>
                        <li class="nav__item"><a href="video.html" class="nav__link">Profile Video</a></li>
                        <li class="nav__item"><a href="projects.html" class="nav__link">Projects</a></li>
                        <li class="nav__item"><a href="testimonials.html" class="nav__link">Testimonials</a></li>
                        <li class="nav__item"><a href="achievements.html" class="nav__link">Achievements</a></li>
                    </ul>
                </div>
                <div class="nav__toggle" id="nav-toggle"><i class='bx bx-menu'></i></div>
            </nav>
        </header>

        <main class="l-main">
            <section class="section bd-grid" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding-top: 8rem;">
                <div class="cv__wrapper" id="openModal">
                    <img src="cv.jpg" alt="CV Image" 
                         style="width: 100%; height: auto; border: 5px solid #0b1e5f; border-radius: 0.5rem;">
                    <i class='bx bx-search-alt zoom__icon'></i>
                </div>
            </section>

            <div id="myModal" class="modal">
                <span class="close" id="closeModal">&times;</span>
                <img class="modal-content" src="cv.jpg" id="modalImg">
            </div>
        </main>

        <footer class="footer">
            <p class="footer__copy">&#169; Nada Foolad. All rights reserved</p>
        </footer>

        <script>
            /* Menu Toggle */
            const showMenu = (toggleId, navId) =>{
                const toggle = document.getElementById(toggleId), nav = document.getElementById(navId)
                if(toggle && nav){ toggle.addEventListener('click', ()=>{ nav.classList.toggle('show') })}
            }
            showMenu('nav-toggle','nav-menu')

            /* Modal Logic */
            const modal = document.getElementById("myModal");
            const wrapper = document.getElementById("openModal");
            const span = document.getElementById("closeModal");
            const body = document.body;

            wrapper.onclick = function() {
                modal.style.display = "block";
                body.style.overflow = "hidden"; // Prevent background from scrolling
            }

            span.onclick = function() {
                modal.style.display = "none";
                body.style.overflow = "auto"; // Re-enable background scrolling
            }
            
            window.onclick = function(event) {
                if (event.target == modal) {
                    modal.style.display = "none";
                    body.style.overflow = "auto";
                }
            }
        </script>
    </body>
</html>
