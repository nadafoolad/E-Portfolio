<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="stylesheet.css">
        <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>
        <title>Cover Letter </title>
        <style>
            /* Container for the image and zoom icon */
            .cover-letter__wrapper {
                position: relative;
                display: inline-block;
                max-width: 400px;
                cursor: pointer;
            }

            /* Small zoom icon in the corner (CV Style) */
            .zoom__icon {
                position: absolute;
                top: 15px;
                right: 15px;
                font-size: 1.2rem;
                color: #0b1e5f;
                background: rgba(255, 255, 255, 0.8);
                padding: 6px;
                border-radius: 50%;
                box-shadow: 0 4px 10px rgba(0,0,0,0.2);
                transition: .3s;
                opacity: 0; 
                pointer-events: none;
            }

            .cover-letter__wrapper:hover .zoom__icon {
                opacity: 1; 
            }

            /* Lightbox Modal Styles with Scrolling */
            .modal {
                display: none; 
                position: fixed; 
                z-index: 1000; 
                left: 0;
                top: 0;
                width: 100%; 
                height: 100%; 
                background-color: rgba(0,0,0,0.9); 
                overflow-y: auto; /* Enables vertical scrolling when image is big */
                padding: 50px 0; /* Space at top and bottom of scrolled image */
            }

            .modal-content {
                margin: auto;
                display: block;
                width: 90%;
                max-width: 900px; /* Slightly wider for better reading */
                border: 5px solid #fff;
                border-radius: 0.5rem;
            }

            .close {
                position: fixed; /* Keeps X in the same spot while you scroll */
                top: 20px;
                right: 35px;
                color: #f1f1f1;
                font-size: 40px;
                font-weight: bold;
                cursor: pointer;
                z-index: 1001;
            }

            .close:hover { color: #bbb; }
        </style>
    </head>
    <body>
        <header class="l-header">
            <nav class="nav bd-grid">
                <div><a href="index.html" class="nav__logo">E-Portfolio</a></div>
                <div class="nav__menu" id="nav-menu">
                    <ul class="nav__list">
                        <li class="nav__item"><a href="index.html" class="nav__link">Home</a></li>
                        <li class="nav__item"><a href="cv.html" class="nav__link">CV</a></li>
                        <li class="nav__item"><a href="cover-letter.html" class="nav__link active-link">Cover Letter</a></li>
                        <li class="nav__item"><a href="video.html" class="nav__link">Profile Video</a></li>
                        <li class="nav__item"><a href="projects.html" class="nav__link">Projects</a></li>
                        <li class="nav__item"><a href="testimonials.html" class="nav__link">Testimonials</a></li>
                        <li class="nav__item"><a href="achievements.html" class="nav__link">Achievements</a></li>
                    </ul>
                </div>
                <div class="nav__toggle" id="nav-toggle"><i class='bx bx-menu'></i></div>
            </nav>
        </header>

        <main class="l-main" style="display: flex; align-items: center; justify-content: center;">
            <section class="section bd-grid" style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding-top: 7rem;">
                
                <div class="cover-letter__wrapper" id="openModal">
                    <img src="cover-letter.jpg" alt="Cover Letter Image" 
                         style="width: 100%; 
                                height: auto; 
                                border: 5px solid #0b1e5f; 
                                border-radius: 0.5rem; 
                                box-shadow: 0px 10px 20px rgba(11, 30, 95, 0.2);">
                    <i class='bx bx-search-alt zoom__icon'></i>
                </div>

                <p style="color: black; margin-top: 1.5rem; text-align: center; line-height: 1.6;">
                    This is my cover letter for the Junior Cybersecurity Analyst position at CTM360.<br>
                    You can view the job posting <a href="https://www.linkedin.com/jobs/view/4204611931/" target="_blank" style="color: #0b1e5f; font-weight: 600; text-decoration: underline;">here</a>.
                </p>

            </section>

            <div id="myModal" class="modal">
                <span class="close" id="closeModal">&times;</span>
                <img class="modal-content" src="cover-letter.jpg">
            </div>
        </main>

        <footer class="footer">
            <p class="footer__copy">&#169; Nada Foolad. All rights reserved</p>
        </footer>

        <script>
            /* Nav Toggle */
            const showMenu = (toggleId, navId) =>{
                const toggle = document.getElementById(toggleId),
                nav = document.getElementById(navId)
                if(toggle && nav){
                    toggle.addEventListener('click', ()=>{
                        nav.classList.toggle('show')
                    })
                }
            }
            showMenu('nav-toggle','nav-menu')

            /* Modal Logic */
            const modal = document.getElementById("myModal");
            const wrapper = document.getElementById("openModal");
            const span = document.getElementById("closeModal");

            wrapper.onclick = function() { modal.style.display = "block"; }
            span.onclick = function() { modal.style.display = "none"; }
            
            window.onclick = function(event) {
                if (event.target == modal) {
                    modal.style.display = "none";
                }
            }
        </script>
    </body>
</html>
